name: Build and Publish Repo
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          pacman -Syu --noconfirm base-devel git clang lld wasi-compiler-rt wasi-libc wasi-libc++ wasi-libc++abi \
            alsa-lib at-spi2-core cairo ffmpeg fontconfig freetype2 \
            gdk-pixbuf2 gtk3 hicolor-icon-theme libpulse libx11 libxcb libxcomposite \
            libxdamage libxext libxfixes libxrandr libxss libxt mime-types nspr nss pango \
            ttf-dejavu nasm rust cbindgen nodejs python python-setuptools
      - name: Fix wasi target
        run: |
          clang_ver=$(clang --version | head -1 | grep -oP '\d+\.\d+\.\d+')
          wasi_dir="/usr/lib/clang/$clang_ver/lib/wasi"
          mkdir -p $wasi_dir
          find /usr/lib/clang -name "*.a" | grep wasi | xargs -I{} cp {} $wasi_dir/ 2>/dev/null || true
          sed -i 's/wasm32-wasi/wasm32-wasip1/g' /usr/share/wasi-sysroot/lib/wasm32-wasi/libcrt1.a 2>/dev/null || true
          ln -sf /usr/share/wasi-sysroot/lib/wasm32-wasi /usr/share/wasi-sysroot/lib/wasm32-wasip1 2>/dev/null || true
      - name: Patch PKGBUILD mozconfig
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/PKGBUILD" ]; then
              sed -i 's|--with-wasi-sysroot=/usr/share/wasi-sysroot|--with-wasi-sysroot=/usr/share/wasi-sysroot\nac_add_options --without-wasm-sandboxed-libraries|g' "$pkg/PKGBUILD"
            fi
          done
      - name: Build packages
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          for pkg in packages/*/; do
            cp -r $pkg /home/builder/
            pkgname=$(basename $pkg)
            chown -R builder /home/builder/$pkgname
            su builder -c "cd /home/builder/$pkgname && makepkg -s --noconfirm --skippgpcheck"
            cp /home/builder/$pkgname/*.pkg.tar.zst ./
          done
      - name: Create repo database
        run: repo-add blackarch-extra.db.tar.gz *.pkg.tar.zst
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
